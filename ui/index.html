<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MarkUpsideDown</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="toolbar">
      <button id="btn-open" title="Open file" class="icon-btn"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 13V3a1 1 0 011-1h4l2 2h4a1 1 0 011 1v1"/><path d="M2 13l1.5-6h11L13 13H2z"/></svg></button>
      <button id="btn-save" title="Save file" class="icon-btn"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 14H3a1 1 0 01-1-1V3a1 1 0 011-1h7l3 3v8a1 1 0 01-1 1z"/><path d="M10 14V9H6v5"/><path d="M6 2v3h4"/></svg></button>
      <button id="btn-import" title="Import document as Markdown" class="icon-btn"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v8"/><path d="M5 7l3 3 3-3"/><path d="M2 11v2a1 1 0 001 1h10a1 1 0 001-1v-2"/></svg></button>
      <span class="separator"></span>
      <div id="url-bar">
        <input type="url" id="url-input" placeholder="Enter URL to fetch as Markdown…" />
        <button id="btn-fetch" title="Fetch URL as Markdown (Accept: text/markdown + AI.toMarkdown)">Fetch</button>
        <button id="btn-render" title="Render page with JS (Browser Rendering)">Render</button>
        <button id="btn-crawl" title="Crawl website and save as Markdown files">Crawl</button>
      </div>
      <span class="separator"></span>
      <button id="btn-table" title="Insert or edit Markdown table">Table</button>
      <button id="btn-cleanup" title="Clean up Markdown structure (normalize headings, links, tables)">Clean up</button>
      <span class="spacer"></span>
      <button id="btn-settings" title="Settings" class="icon-btn"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6.6 1.6h2.8l.4 2 1.4.8 1.9-.8 1.4 1.4-.8 1.9.8 1.4 2 .4v2.8l-2 .4-.8 1.4.8 1.9-1.4 1.4-1.9-.8-1.4.8-.4 2H6.6l-.4-2-1.4-.8-1.9.8-1.4-1.4.8-1.9-.8-1.4-2-.4V6.6l2-.4.8-1.4-.8-1.9 1.4-1.4 1.9.8 1.4-.8z"/><circle cx="8" cy="8" r="2.3"/></svg></button>
    </div>
    <div id="app">
      <div id="sidebar"></div>
      <div id="sidebar-divider"></div>
      <div id="editor-container">
        <div id="editor-header">
          <div id="tab-bar"></div>
        </div>
        <div id="editor-pane"></div>
      </div>
      <div id="divider"></div>
      <div id="preview-wrapper">
        <div id="preview-pane"></div>
      </div>
      <div id="claude-divider"></div>
      <div id="claude-panel"></div>
    </div>
    <div id="status-bar"><span id="status"></span></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
