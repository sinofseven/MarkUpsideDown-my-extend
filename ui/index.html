<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MarkUpsideDown</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="toolbar">
      <button id="btn-open" title="Open file">Open</button>
      <button id="btn-save" title="Save file">Save</button>
      <button id="btn-import" title="Import document as Markdown">Import</button>
      <span class="separator"></span>
      <div id="url-bar">
        <input type="url" id="url-input" placeholder="Enter URL to fetch as Markdown…" />
        <button id="btn-fetch" title="Fetch URL as Markdown (Accept: text/markdown + AI.toMarkdown)">Fetch</button>
        <button id="btn-render" title="Render page with JS (Browser Rendering)">Render</button>
      </div>
      <span class="separator"></span>
      <button id="btn-table" title="Insert or edit Markdown table">Table</button>
      <button id="btn-export-pdf" title="Export as PDF">Export PDF</button>
      <button id="btn-copy-rich" title="Copy as Rich Text (⌘⇧C)">Copy Rich Text</button>
      <span class="spacer"></span>
      <button id="btn-settings" title="Settings">Settings</button>
    </div>
    <div id="app">
      <div id="sidebar"></div>
      <div id="sidebar-divider"></div>
      <div id="editor-container">
        <div id="tab-bar"></div>
        <div id="editor-pane"></div>
      </div>
      <div id="divider"></div>
      <div id="preview-pane"></div>
    </div>
    <div id="status-bar"><span id="status"></span></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
