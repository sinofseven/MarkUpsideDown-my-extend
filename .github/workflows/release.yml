name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      dmg_sha256: ${{ steps.checksums.outputs.dmg_sha256 }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable
        with:
          targets: aarch64-apple-darwin

      - name: Install frontend dependencies
        run: cd ui && npm ci

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: release_notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log --format="- %s" "${PREV_TAG}..HEAD" | grep -v "^- Bump version" || true)
          else
            CHANGES=$(git log --format="- %s" | grep -v "^- Bump version" || true)
          fi

          if [ -z "$CHANGES" ]; then
            CHANGES="- Maintenance release"
          fi

          {
            echo "body<<RELEASE_NOTES_EOF"
            echo "## What's Changed"
            echo ""
            echo "$CHANGES"
            echo "RELEASE_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build Tauri app (Apple Silicon)
        uses: tauri-apps/tauri-action@73fb865345c54760d875b94642314f8c0c894afa # v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "MarkUpsideDown ${{ github.ref_name }}"
          releaseBody: ${{ steps.release_notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: --target aarch64-apple-darwin

      - name: Extract checksums
        id: checksums
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          DMG="target/aarch64-apple-darwin/release/bundle/dmg/MarkUpsideDown_${VERSION}_aarch64.dmg"
          echo "dmg_sha256=$(shasum -a 256 "$DMG" | awk '{print $1}')" >> "$GITHUB_OUTPUT"

  update-homebrew:
    name: Update Homebrew Tap
    needs: build
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout homebrew-tap
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: M-Igashi/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update cask
        env:
          VERSION: ${{ needs.build.outputs.version }}
          DMG_SHA256: ${{ needs.build.outputs.dmg_sha256 }}
        run: |
          cd Casks
          sed -i "s|version \"[^\"]*\"|version \"${VERSION}\"|" markupsidedown.rb
          sed -i "s|sha256 \"[^\"]*\"|sha256 \"${DMG_SHA256}\"|" markupsidedown.rb

      - name: Commit and push
        env:
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/markupsidedown.rb
          git commit -m "Update markupsidedown to ${VERSION}" || exit 0
          git push
